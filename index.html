<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Live Draw — Door Prize</title>
  <meta name="description" content="Premium live draw door prize system." />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/themes.css" />
</head>
<body class="theme-elegant">

  <!-- ═══ STAGE BACKGROUND ═══ -->
  <div class="stage-bg">
    <div class="light-beam"></div>
    <div class="light-beam"></div>
    <div class="light-beam"></div>
  </div>
  <div id="particles"></div>
  <div id="confetti-container"></div>

  <!-- ═══ TOP BAR ═══ -->
  <div class="top-bar">
    <div class="top-left">
      <div class="stat-pill">Peserta <span class="num" id="stat-total">0</span></div>
      <div class="stat-pill">Sisa <span class="num" id="stat-remaining">0</span></div>
      <div class="stat-pill">Pemenang <span class="num gold" id="stat-winners">0</span></div>
    </div>
    <div class="top-right">
      <div id="theme-switcher"></div>
      <button class="top-btn" id="sound-btn">🔊</button>
      <button class="top-btn" id="reset-btn">Reset</button>
    </div>
  </div>

  <!-- ═══ MAIN WRAPPER ═══ -->
  <div class="main-wrapper">
    <div class="stage-center">

      <p class="event-badge">Annual Company Event 2025</p>
      <h1 class="hero-title">Door Prize</h1>
      <p class="hero-sub">Live Draw</p>

      <p class="round-indicator" id="prize-round">Draw #1</p>
      <p class="status-line" id="status-text">Ready</p>

      <!-- ═══ DIGIT DISPLAY ═══ -->
      <div class="digits-stage" id="digits-stage">
        <div class="digit-slot" id="slot-0"><span class="digit-display">?</span></div>
        <div class="digit-slot" id="slot-1"><span class="digit-display">?</span></div>
        <div class="digit-slot" id="slot-2"><span class="digit-display">?</span></div>
        <span class="digit-sep">·</span>
        <div class="digit-slot" id="slot-3"><span class="digit-display">?</span></div>
        <div class="digit-slot" id="slot-4"><span class="digit-display">?</span></div>
        <div class="digit-slot" id="slot-5"><span class="digit-display">?</span></div>
      </div>

      <!-- ═══ CONTROLS ═══ -->
      <button class="action-btn btn-start" id="action-btn">
        <span class="btn-text">Start Draw</span>
        <span class="btn-sub">Spin all digits</span>
      </button>
      <div class="secondary-controls">
        <p class="hint-line">Press <kbd>Space</kbd> to Start / Stop</p>
      </div>
    </div>
  </div>

  <!-- ═══ WINNER PANEL (Full-screen overlay) ═══ -->
  <div class="winner-panel" id="winner-panel">
    <div class="winner-inner">
      <div class="winner-eyebrow">Winner</div>
      <div class="winner-id" id="winner-id-display">------</div>
      <div class="winner-line"></div>
      <div class="winner-name" id="winner-name">—</div>
      <div class="winner-dept" id="winner-dept">—</div>
      <button class="winner-dismiss" id="winner-dismiss">Continue</button>
    </div>
  </div>

  <!-- ═══ BOTTOM TRAY ═══ -->
  <div class="bottom-tray">
    <span class="bottom-label">Winners</span>
    <div class="winners-scroll" id="winners-list">
      <span class="empty-tray">No winners yet</span>
    </div>
  </div>

  <script src="js/database.js"></script>
  <script src="js/sound.js"></script>
  <script src="js/sync.js"></script>
  <script src="js/themes.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
