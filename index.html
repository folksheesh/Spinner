<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Live Draw — Door Prize</title>
  <meta name="description" content="Premium live draw door prize system." />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/themes.css" />
</head>
<body class="theme-elegant">

  <!-- ═══ STAGE BACKGROUND ═══ -->
  <div class="stage-bg">
    <div class="light-beam"></div>
    <div class="light-beam"></div>
    <div class="light-beam"></div>
  </div>
  <div id="particles"></div>
  <div id="confetti-container"></div>

  <!-- ═══ TOP BAR ═══ -->
  <div class="top-bar">
    <div class="top-left">
      <div class="stat-pill">Peserta <span class="num" id="stat-total">0</span></div>
      <div class="stat-pill">Sisa <span class="num" id="stat-remaining">0</span></div>
      <div class="stat-pill">Pemenang <span class="num gold" id="stat-winners">0</span></div>
      <div class="stat-pill" style="margin-left:1rem; border: 1px solid var(--accent-glow); padding: 2px 8px; border-radius: 12px; display: none;" id="remote-pill">
        Remote Code: <span class="num gold" id="remote-code">----</span>
      </div>
    </div>
    <div class="top-right">
      <div id="theme-switcher"></div>
      <button class="top-btn" id="summary-btn">🏆 Summary</button>
      <button class="top-btn" id="sound-btn">🔊</button>
      <button class="top-btn" id="reset-btn">Reset</button>
    </div>
  </div>

  <!-- ═══ MAIN WRAPPER ═══ -->
  <div class="main-wrapper">
    <div class="stage-center">

      <img src="assets/Dunlop.webp" alt="Dunlop Logo" class="sponsor-logo" />
      <p class="event-badge">Annual Company Event 2026</p>
      <h1 class="hero-title">Door Prize</h1>
      <p class="hero-sub">Live Draw</p>

      <p class="round-indicator" id="prize-round">Draw #1</p>
      <p class="status-line" id="status-text">Ready</p>

      <!-- ═══ DIGIT DISPLAY ═══ -->
      <div class="digits-stage" id="digits-stage">
        <div class="digit-slot" id="slot-0"><div class="tire-edge-left"></div><span class="digit-display">?</span><div class="tire-edge-right"></div></div>
        <div class="digit-slot" id="slot-1"><div class="tire-edge-left"></div><span class="digit-display">?</span><div class="tire-edge-right"></div></div>
        <div class="digit-slot" id="slot-2"><div class="tire-edge-left"></div><span class="digit-display">?</span><div class="tire-edge-right"></div></div>
        <span class="digit-sep">·</span>
        <div class="digit-slot" id="slot-3"><div class="tire-edge-left"></div><span class="digit-display">?</span><div class="tire-edge-right"></div></div>
        <div class="digit-slot" id="slot-4"><div class="tire-edge-left"></div><span class="digit-display">?</span><div class="tire-edge-right"></div></div>
        <div class="digit-slot" id="slot-5"><div class="tire-edge-left"></div><span class="digit-display">?</span><div class="tire-edge-right"></div></div>
      </div>

      <!-- ═══ CONTROLS ═══ -->
      <button class="action-btn btn-start" id="action-btn">
        <span class="btn-text">Start Draw</span>
        <span class="btn-sub">Spin all digits</span>
      </button>
      <div class="secondary-controls">
        <p class="hint-line">Click anywhere to start</p>
      </div>
    </div>
  </div>

  <!-- ═══ WINNER PANEL (Full-screen overlay) ═══ -->
  <div class="winner-panel" id="winner-panel">
    <div class="winner-inner">
      <div class="winner-eyebrow">Winner</div>
      <div class="winner-id" id="winner-id-display">------</div>
      <div class="winner-line"></div>
      <div class="winner-name" id="winner-name">—</div>
      <div class="winner-dept" id="winner-dept">—</div>
      <button class="winner-dismiss" id="winner-dismiss">Continue</button>
    </div>
  </div>

  <!-- ═══ SUMMARY PANEL ═══ -->
  <div class="summary-panel" id="summary-panel">
    <div class="summary-inner">
      <div class="summary-header">
        <h2 class="summary-title">Daftar Pemenang</h2>
        <button class="close-btn" id="close-summary">&times;</button>
      </div>
      <div class="summary-content" id="summary-content">
        <!-- Table will be injected here -->
      </div>
      <div class="summary-footer">
        <button class="btn-export" id="export-btn">Export CSV</button>
      </div>
    </div>
  </div>

  <!-- ═══ BOTTOM TRAY ═══ -->
  <div class="bottom-tray">
    <span class="bottom-label">Winners</span>
    <div class="winners-scroll" id="winners-list">
      <span class="empty-tray">No winners yet</span>
    </div>
  </div>

  <script src="js/database.js?v=10"></script>
  <script src="js/sound.js?v=10"></script>
  <script src="js/sync.js?v=10"></script>
  <script src="js/themes.js?v=10"></script>
  <script src="js/app.js?v=10"></script>
</body>
</html>
