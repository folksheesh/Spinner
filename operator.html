<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Operator Panel - Door Prize</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    body {
      background: #0d1117;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      color: #fff;
      font-family: var(--font-body);
      overflow: hidden;
    }
    .panel {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      padding: 3rem;
      text-align: center;
      max-width: 500px;
      width: 90%;
      display: none;
      flex-direction: column;
      gap: 1.5rem;
    }
    .panel.visible {
      display: flex;
      animation: popIn 0.3s ease-out;
    }
    @keyframes popIn {
      from { transform: scale(0.9); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
    .status {
      font-size: 1.2rem;
      color: var(--text-2);
      margin-bottom: 1rem;
    }
    input {
      background: rgba(0,0,0,0.5);
      border: 2px solid rgba(255,255,255,0.2);
      color: #fff;
      font-size: 2rem;
      text-align: center;
      padding: 1rem;
      border-radius: 12px;
      width: 100%;
      letter-spacing: 0.2em;
    }
    .btn-connect {
      background: var(--accent);
      color: #000;
      border: none;
      padding: 1rem;
      font-size: 1.2rem;
      font-weight: 800;
      border-radius: 12px;
      cursor: pointer;
      width: 100%;
    }
    .winner-info {
      font-size: 1.5rem;
      font-weight: 700;
    }
    .winner-id {
      font-family: var(--font-mono);
      color: var(--accent);
      font-size: 2.5rem;
      margin: 1rem 0;
    }
    .action-row {
      display: flex;
      gap: 1rem;
      margin-top: 1rem;
    }
    .btn-action {
      flex: 1;
      padding: 1.5rem 1rem;
      font-size: 1.1rem;
      font-weight: 800;
      border-radius: 16px;
      border: none;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-hadir {
      background: #4CAF50;
      color: white;
    }
    .btn-hadir:active { background: #388E3C; transform: scale(0.95); }
    
    .btn-gugur {
      background: #F44336;
      color: white;
    }
    .btn-gugur:active { background: #D32F2F; transform: scale(0.95); }

    .waiting {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      color: var(--text-2);
    }
    .spinner {
      width: 40px; height: 40px;
      border: 4px solid rgba(255,255,255,0.1);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <!-- WAITING PANEL -->
  <div class="panel" id="waiting-panel">
    <div class="waiting">
      <div class="spinner"></div>
      <h2>Menunggu Pemenang...</h2>
      <p>Silakan fokus ke layar utama.</p>
    </div>
  </div>

  <!-- DECISION PANEL -->
  <div class="panel" id="decision-panel">
    <h2 style="color: var(--accent)">PEMENANG DITEMUKAN!</h2>
    <div class="winner-id" id="w-id">------</div>
    <div class="winner-info" id="w-name">Nama</div>
    <div style="color: var(--text-2); font-size: 1rem;" id="w-dept">Departemen</div>
    
    <div class="action-row">
      <button class="btn-action btn-gugur" id="btn-reject">TIDAK HADIR<br>(GUGUR)</button>
      <button class="btn-action btn-hadir" id="btn-continue">HADIR<br>(LANJUT)</button>
    </div>
  </div>

  <script src="js/sync.js?v=12"></script>
  <script>
    const panels = {
      waiting: document.getElementById('waiting-panel'),
      decision: document.getElementById('decision-panel')
    };

    function showPanel(name) {
      Object.values(panels).forEach(p => p.classList.remove('visible'));
      panels[name].classList.add('visible');
    }

    // Auto connect on load
    window.addEventListener('DOMContentLoaded', () => {
      showPanel('waiting');
      SyncEngine.connectRemote();
    });

    window.addEventListener('doorprize:connected', () => {
      showPanel('waiting');
    });

    window.addEventListener('doorprize:error', () => {
      alert('Koneksi terputus ke Host. Memuat ulang...');
      setTimeout(() => location.reload(), 2000);
    });

    // When a winner is revealed on the host
    window.addEventListener('doorprize:winner_revealed', (e) => {
      const winner = e.detail.winner;
      document.getElementById('w-id').textContent = winner.id;
      document.getElementById('w-name').textContent = winner.name;
      document.getElementById('w-dept').textContent = winner.department;
      showPanel('decision');
    });

    // When host dismisses normally (e.g. via keyboard/BOD remote), hide decision
    window.addEventListener('doorprize:phase_change', (e) => {
      if (e.detail.phase === 'idle' || e.detail.phase === 'spinning') {
        showPanel('waiting');
      }
    });

    // Actions
    document.getElementById('btn-continue').addEventListener('click', () => {
      SyncEngine.emit('action'); // Same as clicking continue
      showPanel('waiting');
    });

    document.getElementById('btn-reject').addEventListener('click', () => {
      if (confirm('Yakin ingin menggugurkan pemenang ini?')) {
        SyncEngine.emit('reject'); // New custom event for host
        showPanel('waiting');
      }
    });
  </script>
</body>
</html>
