<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Remote Control – Door Prize</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;600;700&display=swap');
    :root { --gold:#FFD700;--gold2:#FFA500;--bg:#06060f;--card:rgba(255,255,255,0.06);--accent:#7c3aed;--accent2:#a855f7;--green:#22c55e;--red:#ef4444;--text:#fff;--dim:rgba(255,255,255,.55); }
    *{box-sizing:border-box;margin:0;padding:0}
    body{min-height:100vh;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem 1.5rem;background-image:radial-gradient(ellipse 80% 50% at 50% -10%,rgba(124,58,237,0.3) 0%,transparent 70%)}
    .logo{font-family:'Orbitron',monospace;font-size:.7rem;letter-spacing:.2em;color:var(--dim);text-transform:uppercase;margin-bottom:1.5rem}
    .card{background:var(--card);border:1px solid rgba(255,215,0,0.2);border-radius:28px;padding:2rem 1.8rem;width:100%;max-width:360px;text-align:center;backdrop-filter:blur(16px)}
    .card-title{font-family:'Orbitron',monospace;font-size:1.2rem;font-weight:900;background:linear-gradient(135deg,var(--gold),var(--gold2),#fff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:.3rem}
    .card-sub{color:var(--dim);font-size:.82rem;margin-bottom:1.8rem}
    .conn{font-size:.78rem;color:var(--dim);margin-bottom:1.5rem;display:flex;align-items:center;justify-content:center;gap:.4rem}
    .dot{width:9px;height:9px;border-radius:50%;background:var(--green);animation:blink 1.5s infinite}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

    /* === BIG ACTION BUTTON === */
    .action-remote{width:100%;border:none;border-radius:18px;padding:0;font-family:'Orbitron',monospace;cursor:pointer;transition:all .15s;touch-action:manipulation;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:130px;gap:.4rem;overflow:hidden;position:relative}
    .action-remote:active{transform:scale(0.95)}
    .action-remote:disabled{opacity:.4;cursor:not-allowed;transform:none}
    .btn-label{font-size:1.8rem;font-weight:900;letter-spacing:.06em}
    .btn-hint{font-family:'Inter',sans-serif;font-size:.75rem;font-weight:500;opacity:.8}

    /* START state — gold */
    .action-remote.state-start{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#000;box-shadow:0 8px 32px rgba(255,165,0,0.45)}
    /* STOP state — red pulsing */
    .action-remote.state-stop{background:linear-gradient(135deg,#ef4444,#dc2626);color:#fff;box-shadow:0 8px 32px rgba(239,68,68,0.5);animation:stopGlow .9s infinite}
    @keyframes stopGlow{0%,100%{box-shadow:0 8px 32px rgba(239,68,68,0.5)}50%{box-shadow:0 8px 50px rgba(239,68,68,0.85)}}

    /* Feedback */
    .feedback{margin-top:1.2rem;padding:.8rem;border-radius:12px;font-size:.82rem;font-weight:600;min-height:44px;display:flex;align-items:center;justify-content:center;gap:.4rem;opacity:0;transition:opacity .3s;background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.2);color:var(--green)}
    .feedback.show{opacity:1}

    /* Stop counter */
    .stop-counter{display:none;margin-top:1rem}
    .stop-counter.show{display:block}
    .stop-label{font-size:.72rem;color:var(--dim);letter-spacing:.1em;text-transform:uppercase;margin-bottom:.5rem}
    .stop-dots{display:flex;justify-content:center;gap:.5rem}
    .stop-dot{width:22px;height:22px;border-radius:50%;border:2px solid rgba(255,255,255,.2);transition:all .3s}
    .stop-dot.locked{background:var(--green);border-color:var(--green);box-shadow:0 0 8px rgba(34,197,94,.6)}

    /* Winner mini */
    .winner-mini{display:none;margin-top:1.2rem;padding:1rem;border-radius:14px;background:rgba(255,215,0,.06);border:1px solid rgba(255,215,0,.25);animation:fadeIn .4s ease}
    .winner-mini.show{display:block}
    @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
    .wm-tag{font-size:.65rem;letter-spacing:.15em;color:var(--gold2);text-transform:uppercase;margin-bottom:.4rem}
    .wm-id{font-family:'Orbitron',monospace;font-size:1.4rem;color:var(--gold);font-weight:900}
    .wm-name{font-size:.95rem;font-weight:600;margin-top:.2rem}
    .wm-dept{font-size:.75rem;color:var(--accent2)}
  </style>
</head>
<body>
  <div class="logo">📱 Door Prize Remote</div>

  <div class="card">
    <div class="card-title">REMOTE CONTROL</div>
    <p class="card-sub">Kontrol layar besar dari HP</p>

    <div class="conn"><span class="dot"></span> Terhubung ke layar utama</div>

    <!-- BIG BUTTON -->
    <button class="action-remote state-start" id="action-remote-btn" aria-label="Mulai / Stop">
      <span class="btn-label" id="rbtn-label">▶ MULAI</span>
      <span class="btn-hint" id="rbtn-hint">Putar semua slot</span>
    </button>

    <!-- Stop progress dots -->
    <div class="stop-counter" id="stop-counter">
      <div class="stop-label">Digit terkunci</div>
      <div class="stop-dots" id="stop-dots">
        <div class="stop-dot" data-idx="0"></div>
        <div class="stop-dot" data-idx="1"></div>
        <div class="stop-dot" data-idx="2"></div>
        <div class="stop-dot" data-idx="3"></div>
        <div class="stop-dot" data-idx="4"></div>
        <div class="stop-dot" data-idx="5"></div>
      </div>
    </div>

    <div class="feedback" id="r-feedback">✅ Terkirim!</div>

    <div class="winner-mini" id="winner-mini">
      <div class="wm-tag">🏆 Pemenang</div>
      <div class="wm-id"  id="wm-id">—</div>
      <div class="wm-name" id="wm-name">—</div>
      <div class="wm-dept" id="wm-dept">—</div>
    </div>
  </div>

  <script src="js/database.js"></script>
  <script src="js/sync.js"></script>
  <script>
    SyncEngine.init('remote');

    const btn      = document.getElementById('action-remote-btn');
    const label    = document.getElementById('rbtn-label');
    const hint     = document.getElementById('rbtn-hint');
    const feedback = document.getElementById('r-feedback');
    const counter  = document.getElementById('stop-counter');
    const dots     = document.querySelectorAll('.stop-dot');

    let remotePhase   = 'idle';    // idle | spinning | done
    let stoppedCount  = 0;
    let cooldown      = false;

    function setBtn(phase, stopped = 0) {
      remotePhase  = phase;
      stoppedCount = stopped;

      if (phase === 'idle' || phase === 'done') {
        btn.className = 'action-remote state-start';
        label.textContent = phase === 'done' ? '▶ BERIKUTNYA' : '▶ MULAI';
        hint.textContent  = 'Putar semua slot';
        counter.classList.remove('show');
        dots.forEach(d => d.classList.remove('locked'));
      } else {
        btn.className = 'action-remote state-stop';
        label.textContent = '⏹ STOP';
        hint.textContent  = `Kunci digit ke-${stopped + 1} dari 6`;
        counter.classList.add('show');
        // Update dots
        dots.forEach((d, i) => { i < stopped ? d.classList.add('locked') : d.classList.remove('locked'); });
      }
    }

    function showFeedback(msg, ok = true) {
      feedback.textContent  = ok ? '✅ ' + msg : '⚠️ ' + msg;
      feedback.style.color  = ok ? 'var(--green)' : '#f87171';
      feedback.classList.add('show');
      setTimeout(() => feedback.classList.remove('show'), 2000);
    }

    btn.addEventListener('click', () => {
      if (cooldown) { showFeedback('Tunggu sebentar...', false); return; }
      cooldown = true;
      SyncEngine.emit('action');
      showFeedback('Perintah terkirim!');
      setTimeout(() => { cooldown = false; }, 600);
    });

    // Sync updates from host
    window.addEventListener('doorprize:phase_change', e => {
      setBtn(e.detail.phase, e.detail.stoppedCount || 0);
    });

    window.addEventListener('doorprize:winner_revealed', e => {
      const w = e.detail.winner;
      setBtn('done', 6);
      document.getElementById('wm-id').textContent   = w.id;
      document.getElementById('wm-name').textContent = w.name;
      document.getElementById('wm-dept').textContent = w.department;
      document.getElementById('winner-mini').classList.add('show');
      // Hide winner mini after next start
    });

    window.addEventListener('doorprize:phase_change', e => {
      if (e.detail.phase === 'spinning' && e.detail.stoppedCount === 0) {
        document.getElementById('winner-mini').classList.remove('show');
      }
    });
  </script>
</body>
</html>
